name: Deploy Production

on:
  push:
    branches:
      - main
    paths:
      - app/backend/**
      - app/frontend/**
      - scripts/deploy-vps.sh
      - docker-compose.prod.yml
      - .github/workflows/deploy-production.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        env:
          PROD_SSH_HOST: ${{ secrets['PROD_SSH_HOST'] }}
          PROD_SSH_USER: ${{ secrets['PROD_SSH_USER'] }}
          PROD_SSH_PRIVATE_KEY: ${{ secrets['PROD_SSH_PRIVATE_KEY'] }}
          PROD_SSH_PASSWORD: ${{ secrets['PROD_SSH_PASSWORD'] }}
        run: |
          set -euo pipefail

          if [ -z "${PROD_SSH_HOST:-}" ]; then
            echo "::error::Missing required secret: PROD_SSH_HOST"
            exit 1
          fi

          if [ -z "${PROD_SSH_USER:-}" ]; then
            echo "::error::Missing required secret: PROD_SSH_USER"
            exit 1
          fi

          if [ -z "${PROD_SSH_PRIVATE_KEY:-}" ] && [ -z "${PROD_SSH_PASSWORD:-}" ]; then
            echo "::error::Set PROD_SSH_PRIVATE_KEY or PROD_SSH_PASSWORD"
            exit 1
          fi

      - name: Configure SSH
        shell: bash
        env:
          PROD_SSH_HOST: ${{ secrets['PROD_SSH_HOST'] }}
          PROD_SSH_PORT: ${{ secrets['PROD_SSH_PORT'] }}
          PROD_SSH_PRIVATE_KEY: ${{ secrets['PROD_SSH_PRIVATE_KEY'] }}
          PROD_SSH_KNOWN_HOSTS: ${{ secrets['PROD_SSH_KNOWN_HOSTS'] }}
        run: |
          set -euo pipefail

          ssh_host="${PROD_SSH_HOST}"
          ssh_port="${PROD_SSH_PORT:-22}"

          install -m 700 -d ~/.ssh

          if [ -n "${PROD_SSH_PRIVATE_KEY:-}" ]; then
            printf '%s\n' "$PROD_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
          fi

          if [ -n "${PROD_SSH_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$PROD_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -H -p "$ssh_port" "$ssh_host" > ~/.ssh/known_hosts
          fi

      - name: Install sshpass when password auth is used
        shell: bash
        env:
          PROD_SSH_PRIVATE_KEY: ${{ secrets['PROD_SSH_PRIVATE_KEY'] }}
          PROD_SSH_PASSWORD: ${{ secrets['PROD_SSH_PASSWORD'] }}
        run: |
          set -euo pipefail

          if [ -n "${PROD_SSH_PASSWORD:-}" ] && [ -z "${PROD_SSH_PRIVATE_KEY:-}" ]; then
            sudo apt-get update
            sudo apt-get install -y sshpass
          else
            echo "Skipping sshpass installation."
          fi

      - name: Resolve SSH auth mode
        id: ssh_auth
        shell: bash
        env:
          PROD_SSH_HOST: ${{ secrets['PROD_SSH_HOST'] }}
          PROD_SSH_PORT: ${{ secrets['PROD_SSH_PORT'] }}
          PROD_SSH_USER: ${{ secrets['PROD_SSH_USER'] }}
          PROD_SSH_PRIVATE_KEY: ${{ secrets['PROD_SSH_PRIVATE_KEY'] }}
          PROD_SSH_PASSWORD: ${{ secrets['PROD_SSH_PASSWORD'] }}
        run: |
          set -euo pipefail

          ssh_host="${PROD_SSH_HOST}"
          ssh_port="${PROD_SSH_PORT:-22}"
          target="${PROD_SSH_USER}@${ssh_host}"

          if [ -n "${PROD_SSH_PRIVATE_KEY:-}" ] && ssh -i ~/.ssh/id_ed25519 -p "$ssh_port" -o BatchMode=yes -o ConnectTimeout=10 "$target" "echo ok" >/dev/null 2>&1; then
            echo "auth_mode=key" >> "$GITHUB_OUTPUT"
            echo "target=$target" >> "$GITHUB_OUTPUT"
            echo "ssh_port=$ssh_port" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${PROD_SSH_PASSWORD:-}" ] && sshpass -p "$PROD_SSH_PASSWORD" ssh -p "$ssh_port" -o PreferredAuthentications=password -o PubkeyAuthentication=no -o NumberOfPasswordPrompts=1 -o BatchMode=no -o ConnectTimeout=10 "$target" "echo ok" >/dev/null 2>&1; then
            echo "auth_mode=password" >> "$GITHUB_OUTPUT"
            echo "target=$target" >> "$GITHUB_OUTPUT"
            echo "ssh_port=$ssh_port" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::Cannot establish SSH connection with provided credentials"
          exit 1

      - name: Resolve app path
        id: app_path
        shell: bash
        env:
          PROD_APP_PATH: ${{ secrets['PROD_APP_PATH'] }}
          PROD_SSH_PASSWORD: ${{ secrets['PROD_SSH_PASSWORD'] }}
          AUTH_MODE: ${{ steps.ssh_auth.outputs.auth_mode }}
          TARGET: ${{ steps.ssh_auth.outputs.target }}
          SSH_PORT: ${{ steps.ssh_auth.outputs.ssh_port }}
        run: |
          set -euo pipefail

          app_path="${PROD_APP_PATH:-/opt/katet-crm-2}"

          if [ "$AUTH_MODE" = "key" ]; then
            ssh -i ~/.ssh/id_ed25519 -p "$SSH_PORT" -o BatchMode=yes "$TARGET" "mkdir -p '$app_path'"
          else
            sshpass -p "$PROD_SSH_PASSWORD" ssh -p "$SSH_PORT" -o PreferredAuthentications=password -o PubkeyAuthentication=no -o NumberOfPasswordPrompts=1 -o BatchMode=no "$TARGET" "mkdir -p '$app_path'"
          fi

          echo "app_path=$app_path" >> "$GITHUB_OUTPUT"

      - name: Sync repository to server
        shell: bash
        env:
          PROD_SSH_PASSWORD: ${{ secrets['PROD_SSH_PASSWORD'] }}
          AUTH_MODE: ${{ steps.ssh_auth.outputs.auth_mode }}
          TARGET: ${{ steps.ssh_auth.outputs.target }}
          SSH_PORT: ${{ steps.ssh_auth.outputs.ssh_port }}
          APP_PATH: ${{ steps.app_path.outputs.app_path }}
        run: |
          set -euo pipefail

          rsync_args=(
            -az
            --delete
            --exclude=.git
            --exclude=node_modules
            --exclude=app/backend/.env
            --exclude=app/backend/dist
            --exclude=app/backend/coverage
            --exclude=app/frontend/dist
            --exclude=app/frontend/coverage
            --exclude=app/frontend/test-results
          )

          if [ "$AUTH_MODE" = "key" ]; then
            rsync "${rsync_args[@]}" -e "ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT" ./ "$TARGET:$APP_PATH/"
          else
            sshpass -p "$PROD_SSH_PASSWORD" rsync "${rsync_args[@]}" -e "ssh -p $SSH_PORT -o PreferredAuthentications=password -o PubkeyAuthentication=no -o NumberOfPasswordPrompts=1 -o BatchMode=no" ./ "$TARGET:$APP_PATH/"
          fi

      - name: Sync backend env from secret
        shell: bash
        env:
          PROD_BACKEND_ENV: ${{ secrets['PROD_BACKEND_ENV'] }}
          PROD_SSH_PASSWORD: ${{ secrets['PROD_SSH_PASSWORD'] }}
          AUTH_MODE: ${{ steps.ssh_auth.outputs.auth_mode }}
          TARGET: ${{ steps.ssh_auth.outputs.target }}
          SSH_PORT: ${{ steps.ssh_auth.outputs.ssh_port }}
          APP_PATH: ${{ steps.app_path.outputs.app_path }}
        run: |
          set -euo pipefail

          if [ -z "${PROD_BACKEND_ENV:-}" ]; then
            echo "::warning::PROD_BACKEND_ENV is empty. Keeping existing app/backend/.env on server"
            exit 0
          fi

          backend_env_b64="$(printf '%s' "$PROD_BACKEND_ENV" | base64 | tr -d '\n')"

          if [ "$AUTH_MODE" = "key" ]; then
            ssh -i ~/.ssh/id_ed25519 -p "$SSH_PORT" -o BatchMode=yes "$TARGET" "APP_PATH='$APP_PATH' BACKEND_ENV_B64='$backend_env_b64' bash -se" <<'EOF'
          set -euo pipefail
          cd "$APP_PATH"
          umask 077
          mkdir -p app/backend
          printf '%s' "$BACKEND_ENV_B64" | base64 -d | tr -d '\r' > app/backend/.env
          test -s app/backend/.env
          EOF
          else
            sshpass -p "$PROD_SSH_PASSWORD" ssh -p "$SSH_PORT" -o PreferredAuthentications=password -o PubkeyAuthentication=no -o NumberOfPasswordPrompts=1 -o BatchMode=no "$TARGET" "APP_PATH='$APP_PATH' BACKEND_ENV_B64='$backend_env_b64' bash -se" <<'EOF'
          set -euo pipefail
          cd "$APP_PATH"
          umask 077
          mkdir -p app/backend
          printf '%s' "$BACKEND_ENV_B64" | base64 -d | tr -d '\r' > app/backend/.env
          test -s app/backend/.env
          EOF
          fi

      - name: Run deploy script on server
        shell: bash
        env:
          PROD_SSH_PASSWORD: ${{ secrets['PROD_SSH_PASSWORD'] }}
          AUTH_MODE: ${{ steps.ssh_auth.outputs.auth_mode }}
          TARGET: ${{ steps.ssh_auth.outputs.target }}
          SSH_PORT: ${{ steps.ssh_auth.outputs.ssh_port }}
          APP_PATH: ${{ steps.app_path.outputs.app_path }}
        run: |
          set -euo pipefail

          if [ "$AUTH_MODE" = "key" ]; then
            ssh -i ~/.ssh/id_ed25519 -p "$SSH_PORT" -o BatchMode=yes "$TARGET" "cd '$APP_PATH' && bash scripts/deploy-vps.sh"
          else
            sshpass -p "$PROD_SSH_PASSWORD" ssh -p "$SSH_PORT" -o PreferredAuthentications=password -o PubkeyAuthentication=no -o NumberOfPasswordPrompts=1 -o BatchMode=no "$TARGET" "cd '$APP_PATH' && bash scripts/deploy-vps.sh"
          fi
