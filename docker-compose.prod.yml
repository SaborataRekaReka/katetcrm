services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-katet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-katet}
      POSTGRES_DB: ${POSTGRES_DB:-katet_crm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-katet} -d ${POSTGRES_DB:-katet_crm}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    image: katet-backend
    restart: unless-stopped
    env_file:
      - ./app/backend/.env
    environment:
      NODE_ENV: production
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 45s

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
      args:
        VITE_USE_API: "true"
        VITE_API_BASE_URL: /api/v1
    image: katet-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "127.0.0.1:8080:80"

  caddy:
    image: public.ecr.aws/docker/library/caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:?PUBLIC_HOST is required}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
